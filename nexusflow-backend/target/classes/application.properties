server.port=8080
server.servlet.context-path=/api

spring.datasource.url=jdbc:mysql://localhost:3306/nexusflow_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=password

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Dev: always (re)run SQL seed scripts on startup so the UI reflects latest sample data
spring.sql.init.mode=always
spring.sql.init.data-locations=classpath:data.sql


spring.jpa.open-in-view=true

jwt.secret=ThisIsAVeryStrongSecretKeyForNexusFlowJWTAuthentication123456
jwt.expiration-ms=86400000

springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

logging.level.com.nexusflow=DEBUG